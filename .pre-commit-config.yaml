# Pre-commit: run from repo root. Install with: cd apps/api && uv run pre-commit install
# Requires: uv on PATH (e.g. PATH="$HOME/.local/bin:$PATH")
# API hooks use: make -C apps/api <target>. Web hooks use: make -C apps/web <target>.

repos:
  - repo: local
    hooks:
      - id: fmt
        name: BE fmt
        entry: make -C apps/api fmt
        language: system
        pass_filenames: false

      - id: lint
        name: BE lint
        entry: make -C apps/api lint
        language: system
        pass_filenames: false


      - id: pytest
        name: BE test
        entry: make -C apps/api test
        language: system
        pass_filenames: false

      - id: web-format
        name: FE fmt
        entry: make -C apps/web format-check
        language: system
        pass_filenames: false
        files: ^apps/web/

      - id: web-lint
        name: FE lint
        entry: make -C apps/web lint
        language: system
        pass_filenames: false
        files: ^apps/web/

      - id: web-test
        name: FE test
        entry: make -C apps/web test
        language: system
        pass_filenames: false
        files: ^apps/web/
