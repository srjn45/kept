<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A9BF5"/>
      <stop offset="0.55" stop-color="#208AEF"/>
      <stop offset="1" stop-color="#1370CC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.14" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D6E9FF"/>
    </linearGradient>
    <pattern id="grid" width="73.14" height="73.14" patternUnits="userSpaceOnUse">
      <path d="M73.14 0H0V73.14" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2"/>
    </pattern>
    <pattern id="ticks" width="146.28" height="146.28" patternUnits="userSpaceOnUse">
      <path d="M73.14 65.14V81.14 M65.14 73.14H81.14" stroke="#FFFFFF" stroke-opacity="0.11" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </pattern>
    <filter id="ds" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0A3E77" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- full-bleed background; the OS masks the corners -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>
  <rect width="1024" height="1024" fill="url(#ticks)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- chevron mark -->
  <path d="M300 632 L512 384 L724 632" fill="none" stroke="url(#chev)" stroke-width="132"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#ds)"/>
</svg>
