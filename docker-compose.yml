# Test/local development environment for Expense Manager.
# Start: docker compose up -d
# Stop:  docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_manager"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
