name: Release Mobile

# Cuts a public release: verifies the mobile app (mirrors Mobile CI), builds a
# signed Android APK on the runner with Gradle (no EAS, no build quota), and
# publishes it as a GitHub Release so the promo site's fixed download URL
# (releases/latest/download/kept.apk) picks it up. See RELEASING.md.
#
# Trigger a release by bumping apps/mobile/app.json's expo.version (and
# package.json's version) on main, then tagging that commit and pushing the tag:
#   git tag v1.2.0 && git push origin v1.2.0
#
# You can also run it manually (workflow_dispatch) to build + upload the APK as
# a run artifact WITHOUT publishing a release — useful for smoke-testing the
# build itself.
#
# Signing: the APK is signed with the keystore in repo secrets
# (ANDROID_KEYSTORE_BASE64 / *_PASSWORD / ANDROID_KEY_ALIAS), fed into the
# release signingConfig by apps/mobile/plugins/withReleaseSigning.js.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/mobile

permissions:
  contents: write

env:
  # Keep in sync with the Expo SDK's Android toolchain (SDK 57 → NDK 27.1).
  ANDROID_NDK_VERSION: '27.1.12297006'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;${ANDROID_NDK_VERSION}" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches app.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match apps/mobile/app.json expo.version ($APP_VERSION)." >&2
            echo "Bump expo.version (and package.json's version) to $TAG_VERSION on main first." >&2
            exit 1
          fi

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Configure release signing
        run: |
          {
            echo "KEPT_UPLOAD_STORE_FILE=$RUNNER_TEMP/release.jks"
            echo "KEPT_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "KEPT_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "KEPT_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Build signed release APK
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK as kept.apk
        run: cp android/app/build/outputs/apk/release/app-release.apk kept.apk

      - name: Verify APK is signed with the release key
        run: |
          SIG=$(unzip -p kept.apk META-INF/*.RSA | keytool -printcert | grep SHA256 | tr -d ' ')
          echo "APK signer: $SIG"
          test -n "$SIG"

      # Tag build → publish a GitHub Release the promo site can serve.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ./kept.apk#kept.apk \
            --repo "${{ github.repository }}" \
            --target main \
            --title "Kept $GITHUB_REF_NAME" \
            --generate-notes

      - name: Verify public download link
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -sL -o /dev/null -w '%{http_code} %{content_type}\n' \
            "https://github.com/${{ github.repository }}/releases/latest/download/kept.apk"

      # Manual run (no tag) → keep the APK as a run artifact for smoke-testing.
      - name: Upload APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: kept-apk
          path: apps/mobile/kept.apk
          if-no-files-found: error
